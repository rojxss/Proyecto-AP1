<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup — Plataforma Escuela Villas de Ayarco</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* =====================================================================
   PALETA — derivada del escudo institucional (verde laurel + banner amarillo)
   ===================================================================== */
:root{
  --verde-900:#14532B;
  --verde-700:#1E6B3C;
  --verde-500:#2E8B50;
  --verde-100:#E4F0E8;
  --amarillo:#F2C14E;
  --amarillo-suave:#FBEFD3;
  --crema:#FBFAF6;
  --blanco:#FFFFFF;
  --tinta:#1F2922;
  --tinta-suave:#5A6B5F;
  --linea:#D8E2DA;
  --rojo:#C44536;
  --azul:#2B6CB0;
  --gris:#8A958D;
  --radio:14px;
  --sombra:0 2px 10px rgba(20,83,43,.08);
  --display:'Bricolage Grotesque',sans-serif;
  --cuerpo:'Atkinson Hyperlegible',sans-serif; /* tipografía diseñada para máxima legibilidad: apta para usuarios con poca experiencia digital */
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--cuerpo);background:var(--crema);color:var(--tinta);font-size:16px;line-height:1.55}
h1,h2,h3,.display{font-family:var(--display)}
a{color:var(--verde-700)}
button{font-family:var(--cuerpo);cursor:pointer}

/* ============ BARRA DEL MOCKUP (no forma parte del diseño final) ============ */
.mock-bar{position:sticky;top:0;z-index:99;background:var(--tinta);color:#fff;padding:.5rem .9rem;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;font-size:.8rem}
.mock-bar strong{color:var(--amarillo);letter-spacing:.06em}
.mock-bar button{background:#3A463E;border:1px solid #58655C;color:#fff;border-radius:99px;padding:.3rem .8rem;font-size:.78rem}
.mock-bar button.activa{background:var(--amarillo);color:var(--tinta);border-color:var(--amarillo);font-weight:700}
.vista{display:none}.vista.activa{display:block}

/* ============ CABECERA INSTITUCIONAL COMPARTIDA ============ */
.franja-mep{background:var(--verde-900);color:#CDE5D5;font-size:.74rem;text-align:center;padding:.25rem;letter-spacing:.04em}
header.inst{background:var(--verde-700);color:#fff;padding:.85rem 1.2rem;display:flex;align-items:center;gap:.9rem;flex-wrap:wrap}
.escudo{width:46px;height:52px;background:var(--blanco);border:2px solid var(--amarillo);border-radius:6px 6px 50% 50%/6px 6px 38% 38%;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:800;color:var(--verde-700);font-size:.95rem;flex-shrink:0}
header.inst .nombres b{font-family:var(--display);font-size:1.12rem;display:block;line-height:1.2}
header.inst .nombres span{font-size:.78rem;opacity:.85}
header.inst nav{margin-left:auto;display:flex;gap:.3rem;flex-wrap:wrap}
header.inst nav a{color:#fff;text-decoration:none;padding:.45rem .85rem;border-radius:8px;font-size:.88rem}
header.inst nav a.activo{background:rgba(255,255,255,.16);outline:2px solid var(--amarillo)}
header.inst nav a:hover{background:rgba(255,255,255,.12)}
.btn{display:inline-block;background:var(--verde-700);color:#fff;border:none;border-radius:10px;padding:.65rem 1.2rem;font-size:.95rem;font-weight:700;text-decoration:none}
.btn:hover{background:var(--verde-900)}
.btn.secundario{background:var(--blanco);color:var(--verde-700);border:1.5px solid var(--verde-700)}
.btn.amarillo{background:var(--amarillo);color:var(--tinta)}

/* ============ PÁGINA PÚBLICA ============ */
.hero{background:linear-gradient(160deg,var(--verde-700) 0%,var(--verde-900) 100%);color:#fff;padding:3.2rem 1.4rem 4.4rem;position:relative;overflow:hidden}
.hero::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border:32px solid rgba(242,193,78,.18);border-radius:50%}
.hero .interno{max-width:1040px;margin:0 auto;display:grid;grid-template-columns:1.4fr 1fr;gap:2rem;align-items:center}
.hero h1{font-size:clamp(1.9rem,4.4vw,3rem);font-weight:800;line-height:1.08;letter-spacing:-.01em}
.hero h1 em{color:var(--amarillo);font-style:normal}
.hero p.lema{margin:.9rem 0 1.5rem;font-size:1.05rem;color:#D9EBDF;max-width:42ch}
.tarjeta-datos{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);border-radius:var(--radio);padding:1.1rem 1.2rem;font-size:.9rem;backdrop-filter:blur(2px)}
.tarjeta-datos div{display:flex;gap:.55rem;padding:.32rem 0;align-items:baseline}
.tarjeta-datos .ico{color:var(--amarillo);font-weight:800;min-width:1.1rem}
main.publica{max-width:1040px;margin:-2.4rem auto 0;padding:0 1.4rem 3rem;position:relative}
.bloque{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra);padding:1.6rem;margin-bottom:1.6rem}
.eyebrow{font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;color:var(--verde-500);font-weight:700;margin-bottom:.4rem}
.bloque h2{font-size:1.5rem;font-weight:700;margin-bottom:.7rem}
.dos-col{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem}
.servicios{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.servicios span{background:var(--verde-100);color:var(--verde-900);border-radius:99px;padding:.35rem .9rem;font-size:.85rem}
/* Tablón de avisos — elemento distintivo */
.tablon{background:var(--amarillo-suave);border:1px solid #EBD9A8;border-radius:var(--radio);padding:1.6rem}
.tablon h2{display:flex;align-items:center;gap:.55rem}
.tablon .pin{width:14px;height:14px;border-radius:50%;background:var(--rojo);box-shadow:inset -2px -2px 3px rgba(0,0,0,.3)}
.avisos{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:1rem;margin-top:1rem}
.aviso{background:var(--blanco);border:1px solid var(--linea);border-radius:10px;padding:1rem;position:relative;transform:rotate(-.5deg);box-shadow:var(--sombra)}
.aviso:nth-child(2n){transform:rotate(.55deg)}
.aviso::before{content:"";position:absolute;top:-7px;left:50%;width:12px;height:12px;border-radius:50%;background:var(--verde-500);box-shadow:inset -2px -2px 3px rgba(0,0,0,.25)}
.aviso time{font-size:.74rem;color:var(--tinta-suave);text-transform:uppercase;letter-spacing:.06em}
.aviso h3{font-size:1rem;margin:.25rem 0 .3rem}
.aviso p{font-size:.88rem;color:var(--tinta-suave)}
footer.publica{background:var(--verde-900);color:#BCD8C6;text-align:center;padding:1.6rem;font-size:.84rem}

/* ============ LOGIN ============ */
.login-fondo{min-height:78vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;background:linear-gradient(160deg,var(--verde-100),var(--crema))}
.login-caja{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra);width:min(400px,100%);padding:2.2rem}
.login-caja .escudo{margin:0 auto 1rem;width:58px;height:66px;font-size:1.2rem}
.login-caja h1{font-size:1.45rem;text-align:center;margin-bottom:.3rem}
.login-caja p.sub{text-align:center;color:var(--tinta-suave);font-size:.9rem;margin-bottom:1.5rem}
.campo{margin-bottom:1rem}
.campo label{display:block;font-weight:700;font-size:.88rem;margin-bottom:.3rem}
.campo input,.campo select,.campo textarea{width:100%;border:1.5px solid var(--linea);border-radius:10px;padding:.7rem .8rem;font-size:1rem;font-family:var(--cuerpo);background:var(--crema)}
.campo input:focus,.campo select:focus,.campo textarea:focus{outline:3px solid var(--amarillo);border-color:var(--verde-500)}
.login-caja .btn{width:100%;text-align:center;margin-top:.4rem}
.login-caja .olvide{display:block;text-align:center;margin-top:1rem;font-size:.88rem}
.nota-acceso{margin-top:1.4rem;background:var(--verde-100);border-radius:10px;padding:.8rem;font-size:.82rem;color:var(--verde-900)}

/* ============ APP (padre / admin) ============ */
.app{display:grid;grid-template-columns:230px 1fr;min-height:80vh}
aside.menu{background:var(--blanco);border-right:1px solid var(--linea);padding:1.1rem .8rem}
aside.menu .usuario{padding:.6rem;border-radius:10px;background:var(--verde-100);margin-bottom:1rem;font-size:.84rem}
aside.menu .usuario b{display:block;font-size:.92rem}
aside.menu a{display:flex;gap:.55rem;align-items:center;padding:.62rem .7rem;border-radius:10px;text-decoration:none;color:var(--tinta);font-size:.93rem;margin-bottom:.15rem}
aside.menu a.activo{background:var(--verde-700);color:#fff;font-weight:700}
aside.menu a:not(.activo):hover{background:var(--verde-100)}
aside.menu .salir{margin-top:1.4rem;color:var(--rojo)}
section.contenido{padding:1.6rem;max-width:980px}
.selector-hijo{display:flex;gap:.5rem;align-items:center;background:var(--blanco);border:1px solid var(--linea);border-radius:99px;padding:.4rem .5rem .4rem 1rem;margin-bottom:1.4rem;width:max-content;max-width:100%;box-shadow:var(--sombra)}
.selector-hijo span{font-size:.84rem;color:var(--tinta-suave)}
.chip-hijo{border:none;border-radius:99px;padding:.4rem .95rem;font-size:.88rem;background:transparent}
.chip-hijo.activo{background:var(--verde-700);color:#fff;font-weight:700}
.titulo-seccion{display:flex;align-items:baseline;gap:.8rem;flex-wrap:wrap;margin-bottom:.4rem}
.titulo-seccion h1{font-size:1.6rem}
.meta-actualizacion{font-size:.8rem;color:var(--tinta-suave);background:var(--blanco);border:1px solid var(--linea);border-radius:99px;padding:.25rem .8rem}

/* Horario */
.horario{width:100%;border-collapse:separate;border-spacing:4px;margin-top:1rem}
.horario th{background:var(--verde-700);color:#fff;font-family:var(--display);font-weight:600;padding:.55rem;border-radius:8px;font-size:.86rem}
.horario td{background:var(--blanco);border:1px solid var(--linea);border-radius:8px;padding:.5rem .55rem;font-size:.8rem;vertical-align:top;min-width:104px}
.horario td b{display:block;font-size:.84rem;color:var(--verde-900)}
.horario td .aula{color:var(--tinta-suave);font-size:.72rem}
.horario td.bloque-hora{background:var(--amarillo-suave);border-color:#EBD9A8;font-weight:700;white-space:nowrap;font-size:.76rem}
.horario td.receso{background:var(--verde-100);text-align:center;color:var(--verde-900);font-weight:700}

/* Estados de cita */
.estado{display:inline-block;border-radius:99px;padding:.2rem .75rem;font-size:.76rem;font-weight:700;letter-spacing:.02em}
.estado.Pendiente{background:var(--amarillo-suave);color:#8a6310;border:1px solid var(--amarillo)}
.estado.Confirmada{background:var(--verde-100);color:var(--verde-900);border:1px solid var(--verde-500)}
.estado.Rechazada{background:#F8E2DE;color:var(--rojo);border:1px solid var(--rojo)}
.estado.Cancelada{background:#EEF0EE;color:var(--gris);border:1px solid var(--gris)}
.estado.Completada{background:#E1ECF7;color:var(--azul);border:1px solid var(--azul)}
.tabla{width:100%;border-collapse:collapse;background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);overflow:hidden;margin-top:1rem;box-shadow:var(--sombra)}
.tabla th{background:var(--verde-100);color:var(--verde-900);text-align:left;font-size:.82rem;padding:.7rem .9rem;letter-spacing:.03em}
.tabla td{padding:.75rem .9rem;border-top:1px solid var(--linea);font-size:.9rem}
.form-cita{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra);padding:1.4rem;margin-top:1rem;max-width:560px}
.bloques-disp{display:flex;gap:.5rem;flex-wrap:wrap;margin:.3rem 0 .8rem}
.bloque-btn{border:1.5px solid var(--verde-500);background:var(--blanco);color:var(--verde-900);border-radius:10px;padding:.5rem .8rem;font-size:.85rem}
.bloque-btn.ocupado{border-color:var(--linea);color:var(--gris);background:var(--crema);text-decoration:line-through;cursor:not-allowed}
.bloque-btn.sel{background:var(--verde-700);color:#fff;font-weight:700}
.contador{font-size:.76rem;color:var(--tinta-suave);text-align:right}

/* Publicaciones */
.filtros{display:flex;gap:.5rem;flex-wrap:wrap;margin:.8rem 0 1.1rem}
.filtros button{border:1.5px solid var(--linea);background:var(--blanco);border-radius:99px;padding:.4rem 1rem;font-size:.86rem}
.filtros button.activo{background:var(--verde-700);border-color:var(--verde-700);color:#fff;font-weight:700}
.filtros input[type=date]{border:1.5px solid var(--linea);border-radius:99px;padding:.35rem .8rem;font-family:var(--cuerpo);font-size:.86rem;background:var(--blanco)}
.pub{background:var(--blanco);border:1px solid var(--linea);border-left:5px solid var(--verde-500);border-radius:12px;padding:1rem 1.2rem;margin-bottom:.9rem;box-shadow:var(--sombra)}
.pub.evento{border-left-color:var(--amarillo)}
.pub.actividad{border-left-color:var(--azul)}
.pub .tipo{font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--tinta-suave)}
.pub h3{font-size:1.05rem;margin:.2rem 0 .3rem}
.pub p{font-size:.9rem;color:var(--tinta-suave)}
.pub .pie{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--tinta-suave);margin-top:.5rem}

/* Chatbot */
.chat{max-width:640px;background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);box-shadow:var(--sombra);display:flex;flex-direction:column;height:520px;margin-top:1rem}
.chat .historial{flex:1;overflow-y:auto;padding:1.2rem;display:flex;flex-direction:column;gap:.8rem}
.msg{max-width:78%;padding:.65rem .95rem;border-radius:14px;font-size:.92rem}
.msg.bot{background:var(--verde-100);color:var(--verde-900);border-bottom-left-radius:4px;align-self:flex-start}
.msg.usuario{background:var(--verde-700);color:#fff;border-bottom-right-radius:4px;align-self:flex-end}
.chat .sugerencias{display:flex;gap:.45rem;flex-wrap:wrap;padding:0 1.2rem .6rem}
.chat .sugerencias button{border:1px solid var(--verde-500);background:var(--blanco);color:var(--verde-900);border-radius:99px;padding:.3rem .8rem;font-size:.78rem}
.chat .entrada{display:flex;gap:.5rem;border-top:1px solid var(--linea);padding:.8rem}
.chat .entrada input{flex:1;border:1.5px solid var(--linea);border-radius:10px;padding:.6rem .8rem;font-family:var(--cuerpo)}

/* Admin */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1rem;margin:1rem 0 1.4rem}
.kpi{background:var(--blanco);border:1px solid var(--linea);border-radius:var(--radio);padding:1rem 1.1rem;box-shadow:var(--sombra)}
.kpi b{font-family:var(--display);font-size:1.8rem;color:var(--verde-700);display:block}
.kpi span{font-size:.8rem;color:var(--tinta-suave)}
.aviso-todo{background:var(--amarillo-suave);border:1px dashed var(--amarillo);border-radius:10px;padding:.7rem .9rem;font-size:.82rem;color:#7a5a10;margin:.6rem 0}

@media(max-width:820px){
  .hero .interno,.dos-col{grid-template-columns:1fr}
  .app{grid-template-columns:1fr}
  aside.menu{display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--linea);gap:.3rem;padding:.6rem}
  aside.menu .usuario,aside.menu .salir{display:none}
  aside.menu a{white-space:nowrap}
  .horario{display:block;overflow-x:auto}
}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<!-- Barra del mockup: solo para navegar entre vistas. NO forma parte del producto. -->
<div class="mock-bar">
  <strong>MOCKUP</strong>
  <button data-v="publica" class="activa">Página pública</button>
  <button data-v="login">Login</button>
  <button data-v="horario">Padre · Horario</button>
  <button data-v="citas">Padre · Citas</button>
  <button data-v="publicaciones">Padre · Publicaciones</button>
  <button data-v="chatbot">Padre · Chatbot</button>
  <button data-v="admin">Panel admin</button>
</div>

<div id="app"></div>

<script>
/* =====================================================================
   ╔═══════════════════════════════════════════════════════════════╗
   ║  CONFIG — EDITAR SOLO ESTE BLOQUE PARA ACTUALIZAR CONTENIDO    ║
   ║  Todo lo que se ve en el mockup sale de aquí.                  ║
   ║  Los campos marcados con TODO esperan confirmación de la       ║
   ║  institución. Fuentes: PDF Avance 1 (nombres = autoridad) y    ║
   ║  drecartago.org/circuito6 (datos de contacto, reseña).         ║
   ╚═══════════════════════════════════════════════════════════════╝
   ===================================================================== */
const CONFIG = {
  institucion: {
    nombre: "Escuela Villas de Ayarco",
    lugar: "La Unión de Cartago",
    fundacion: "1991", // El escudo indica 1991; la DRE menciona apertura aprobada en 1990. TODO: confirmar con la institución.
    lema: "Un solo lugar para toda la información escolar de sus hijos: horarios, citas, actividades y comunicados.",
    direccion: "400 metros al sur del Supermercado Pasoca, Villas de Ayarco, San Juan, La Unión, Cartago",
    telefono: "2272-4746",
    correo: "esc.villasdeayarco@mep.go.cr",
    horarioAtencion: "Lunes a viernes, 7:00 a. m. – 2:20 p. m.", // jornada ampliada según DRE Cartago
    directora: "M.A.Ed. Kimberly Bonilla Noguera",   // ← PDF (autoridad). La web de la DRE está desactualizada.
    secretaria: "Josseline Ilama Navarro",            // ← PDF
    circuito: "Circuito 06, Dirección Regional de Educación de Cartago",
    resena: "La Escuela Villas de Ayarco nació del esfuerzo de la propia comunidad: un grupo de vecinos gestionó su apertura para que los niños del barrio no tuvieran que trasladarse a otras instituciones. Aprobada su creación en 1990, hoy es catalogada como una escuela de excelencia, con jornada ampliada y una población de más de 600 estudiantes.",
    servicios: ["Terapia del lenguaje","Terapia emocional","Apoyo al aprendizaje","Aula integrada","Orientación"],
    avisosPublicos: [ // TODO: reemplazar por avisos reales de la dirección
      {fecha:"09 jun 2026", titulo:"Matrícula curso 2027", texto:"El periodo de prematrícula para el curso lectivo 2027 inicia en julio. Detalles en secretaría."},
      {fecha:"05 jun 2026", titulo:"Acto cívico", texto:"Celebración del Día del Árbol el lunes 15 de junio a las 8:00 a. m. en el gimnasio."},
      {fecha:"01 jun 2026", titulo:"Nueva plataforma para padres", texto:"La escuela estrena este sitio para consultar horarios, agendar citas y recibir comunicados."}
    ]
  },

  /* Preguntas frecuentes SUPUESTAS (típicas de una escuela pública costarricense).
     Alimentan el chatbot y la sección de la página pública. TODO: validar con secretaría. */
  faq: [
    {p:"¿Cuál es el horario de atención de la escuela?", r:"La jornada es de lunes a viernes, de 7:00 a. m. a 2:20 p. m. La secretaría atiende dentro de ese horario."},
    {p:"¿Cómo agendo una cita con la maestra de mi hijo?", r:"Desde la sección Citas de esta plataforma: elija al docente, un bloque disponible y escriba el motivo. Recibirá la confirmación por correo."},
    {p:"¿Cómo justifico una ausencia de mi hijo?", r:"Debe presentar la justificación por escrito a la docente guía dentro de los tres días hábiles siguientes, o entregarla en secretaría."},
    {p:"¿Cuándo es la matrícula y qué documentos necesito?", r:"Las fechas se publican en los comunicados de esta plataforma. Generalmente se solicita constancia de nacimiento, hoja de vacunas al día y comprobante de domicilio."},
    {p:"¿Cuál es el uniforme oficial?", r:"El uniforme oficial del MEP: camisa celeste, pantalón o enagua azul y zapatos negros. Para Educación Física, el uniforme deportivo de la institución."},
    {p:"¿La escuela ofrece servicios de apoyo?", r:"Sí: terapia del lenguaje, terapia emocional, apoyo al aprendizaje, aula integrada y orientación. Consulte con la docente guía para una referencia."},
    {p:"Olvidé mi contraseña, ¿qué hago?", r:"En la pantalla de inicio de sesión use '¿Olvidó su contraseña?'. Recibirá un enlace por correo válido por 30 minutos."},
    {p:"¿Cómo me comunico con la dirección?", r:"Al teléfono 2272-4746 o al correo esc.villasdeayarco@mep.go.cr, en horario de oficina."}
  ],

  /* ====== DATOS DEMO para las vistas autenticadas (reemplazar con datos reales) ====== */
  padreDemo: {nombre:"María Rodríguez Solano", hijos:[
    {nombre:"Daniel", nivel:"3.º grado", grupo:"3-2"},
    {nombre:"Sofía", nivel:"5.º grado", grupo:"5-1"}
  ]},

  bloques: [ // TODO: confirmar bloques horarios oficiales con la institución
    "7:00 – 7:40","7:40 – 8:20","8:20 – 9:00","RECESO","9:20 – 10:00","10:00 – 10:40","ALMUERZO","11:30 – 12:10","12:10 – 12:50","1:00 – 1:40","1:40 – 2:20"
  ],
  dias: ["Lunes","Martes","Miércoles","Jueves","Viernes"],
  horarioDemo: { // [bloque][día] — datos de ejemplo para grupo 3-2
    ultimaActualizacion: "Actualizado el 10 jun 2026, 2:15 p. m.",

/* ---------- VISTA: HORARIO ---------- */
function vHorario(){
  const H = CONFIG.horarioDemo;
  const filas = CONFIG.bloques.map((b,bi)=>{
    if(b==="RECESO"||b==="ALMUERZO")
      return `<tr><td class="bloque-hora">${b==='RECESO'?'9:00 – 9:20':'10:40 – 11:30'}</td><td colspan="5" class="receso">${b==='RECESO'?'Receso':'Almuerzo'}</td></tr>`;
    const celdas = CONFIG.dias.map((_,di)=>{
      const c = (H.celdas[bi]||{})[di];
      return c?`<td><b>${c[0]}</b><span class="aula">${c[1]}</span></td>`:`<td></td>`;
    }).join('');
    return `<tr><td class="bloque-hora">${b}</td>${celdas}</tr>`;
  }).join('');
  return `${headerInst('app',true)}<div class="app">${menuLateral('horario')}
  <section class="contenido">
    ${selectorHijo(0)}
    <div class="titulo-seccion"><h1>Horario semanal</h1><span class="meta-actualizacion">${H.ultimaActualizacion}</span></div>

    <table class="horario"><thead><tr><th>Hora</th>${CONFIG.dias.map(d=>`<th>${d}</th>`).join('')}</tr></thead><tbody>${filas}</tbody></table>
    <div class="aviso-todo">TODO: bloques horarios y materias por confirmar con la institución (jornada oficial 7:00 a. m. – 2:20 p. m.). Si un estudiante no tiene horario cargado, esta vista muestra: «El horario de su hijo aún no está disponible. La escuela lo publicará próximamente.»</div>
  </section></div>`;
}

/* ---------- navegación del mockup ---------- */
const vistas = {publica:vPublica, login:vLogin, horario:vHorario, citas:vCitas, publicaciones:vPublicaciones, chatbot:vChatbot, admin:vAdmin};
const app = document.getElementById('app');
function mostrar(v){
  app.innerHTML = `<div class="vista activa">${vistas[v]()}</div>`;
  document.querySelectorAll('.mock-bar button').forEach(b=>b.classList.toggle('activa', b.dataset.v===v));
  window.scrollTo(0,0);
}
document.querySelectorAll('.mock-bar button').forEach(b=>b.addEventListener('click',()=>mostrar(b.dataset.v)));
mostrar('publica');
</script>
